name: Splick
options:
  bundleIdPrefix: com.splick
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  SplickCore:
    path: Packages/SplickCore
  SplickDomain:
    path: Packages/SplickDomain
  FeatureAuth:
    path: Packages/FeatureAuth
  FeatureSocialFeed:
    path: Packages/FeatureSocialFeed
  FeatureMedia:
    path: Packages/FeatureMedia
  FeatureExpense:
    path: Packages/FeatureExpense
  FeatureNotification:
    path: Packages/FeatureNotification

targets:
  SplickApp:
    type: application
    platform: iOS
    sources:
      - path: SplickApp/Sources
    resources:
      - path: SplickApp/Resources
    dependencies:
      - package: SplickCore
        product: Networking
      - package: SplickCore
        product: Storage
      - package: SplickCore
        product: DesignSystem
      - package: SplickCore
        product: Common
      - package: SplickDomain
        product: SplickDomain
      - package: FeatureAuth
        product: FeatureAuth
      - package: FeatureSocialFeed
        product: FeatureSocialFeed
      - package: FeatureMedia
        product: FeatureMedia
      - package: FeatureExpense
        product: FeatureExpense
      - package: FeatureNotification
        product: FeatureNotification
    settings:
      base:
        INFOPLIST_FILE: SplickApp/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.splick.app
        TARGETED_DEVICE_FAMILY: 1
    info:
      path: SplickApp/Resources/Info.plist
      properties:
        CFBundleName: Splick
        CFBundleDisplayName: Splick
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Splick needs camera access to capture and share moments with friends."
        NSPhotoLibraryUsageDescription: "Splick needs photo library access to share photos with friends."

schemes:
  SplickApp:
    build:
      targets:
        SplickApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
