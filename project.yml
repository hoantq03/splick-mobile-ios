name: Splick

# Per-developer signing (Team ID). Copy project.local.yml.example → project.local.yml
include:
  - path: project.local.yml
    optional: true

options:
  bundleIdPrefix: com.splick
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    # DEVELOPMENT_TEAM: set in project.local.yml (see project.local.yml.example)
    CODE_SIGN_STYLE: Automatic
    ONLY_ACTIVE_ARCH: YES
    # Apple Silicon simulators are arm64-only; avoid x86_64 SplickApp vs arm64 SPM mismatch
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

packages:
  SplickCore:
    path: Packages/SplickCore
  SplickDomain:
    path: Packages/SplickDomain
  FeatureAuth:
    path: Packages/FeatureAuth
  FeatureSocialFeed:
    path: Packages/FeatureSocialFeed
  FeatureMedia:
    path: Packages/FeatureMedia
  FeatureExpense:
    path: Packages/FeatureExpense
  FeatureNotification:
    path: Packages/FeatureNotification
  FeatureFriends:
    path: Packages/FeatureFriends
  SimulationKit:
    path: Packages/SimulationKit
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  SplickApp:
    type: application
    platform: iOS
    sources:
      - path: SplickApp/Sources
    dependencies:
      - package: SplickCore
        product: Networking
      - package: SplickCore
        product: Storage
      - package: SplickCore
        product: DesignSystem
      - package: SplickCore
        product: Common
      - package: SplickDomain
        product: SplickDomain
      - package: FeatureAuth
        product: FeatureAuth
      - package: FeatureSocialFeed
        product: FeatureSocialFeed
      - package: FeatureMedia
        product: FeatureMedia
      - package: FeatureExpense
        product: FeatureExpense
      - package: FeatureNotification
        product: FeatureNotification
      - package: FeatureFriends
        product: FeatureFriends
      - package: SimulationKit
        product: SimulationKit
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_NAME: SplickApp
        INFOPLIST_FILE: SplickApp/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.splick.app
        TARGETED_DEVICE_FAMILY: 1
    resources:
      - path: SplickApp/Resources
        excludes:
          - Info.plist

schemes:
  SplickApp:
    build:
      targets:
        SplickApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
